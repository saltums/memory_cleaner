<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Whitening System - 業務ポータル</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Sawarabi+Mincho&family=Roboto+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="職員用意識同期ポータル。意識の漂白業務を開始してください。">
</head>
<body>
    
    <div id="container">
        <div class="header">
            <span>MEM_CLEANER_LOG // ID: 702</span>
            <span id="clock">CONNECTING...</span>
        </div>

        <!-- Setup Screen (意識同期) -->
        <div id="ui-setup" class="fade-in">
            <h3 style="font-weight:lighter; color:#64748b; letter-spacing:0.2em; margin-bottom: 40px;">業務開始：意識同期プロセス</h3>
            
            <div class="input-group">
                <label>1. 職員ID（氏名）</label>
                <input type="text" id="p-name" placeholder="氏名を入力">
            </div>
            
            <div class="input-group">
                <label>2. 今朝、最後に口にした「食べ物」は？</label>
                <input type="text" id="p-food" placeholder="例：ツナマヨおにぎり">
            </div>
            
            <div id="news-status">時事ニュースを同期中...</div>

            <button id="start-btn" onclick="boot()" disabled>打刻：業務を開始</button>
            
            <p style="font-size: 0.6rem; color: #94a3b8; margin-top: 35px; text-align: center; font-family: 'Inter', sans-serif;">
                ※AI解析にはGemini APIキーが必要です。未入力時は規定の解析プロトコルを実行します。
            </p>
        </div>

        <!-- Work Screen (業務中) -->
        <div id="ui-work" class="hidden">
            <div id="console"></div>
            
            <div class="progress-bar">
                <div id="progress" class="progress-fill"></div>
            </div>

            <div id="monologue" class="monologue"></div>

            <button id="btn-action" onclick="handleStep()">漂白を開始する</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
