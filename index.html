<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whiteing Day - 記垢剥離業務</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;700&family=Sawarabi+Mincho&family=Roboto+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="overlay"></div>

<!-- --- Smartphone Interface --- -->
<div id="phone-screen" class="phone-container">
    <div id="lock-screen">
        <div class="status-bar">
            <span class="carrier">WHITE_NET</span>
            <div class="status-icons">
                <span class="wifi">📶</span>
                <span class="battery">88%</span>
            </div>
        </div>
        
        <div class="time-container">
            <div class="date" id="phone-date">4月7日 火曜日</div>
            <div class="time" id="clock">03:14</div>
        </div>
        
        <div id="notif-container">
            <div id="loading-notif" class="notification system-notif">
                <div class="notif-header">
                    <div class="notif-icon">🛡️</div>
                    <span class="notif-tag">SYSTEM</span>
                </div>
                <div class="notif-body">外部ログ同期中... <span class="swipe-hint">← スワイプして消去</span></div>
            </div>
        </div>

        <div id="auth-area" class="hidden glass-panel">
            <div class="auth-header">個体識別認証</div>
            <div class="auth-message">業務再開には以下の入力が必要です</div>
            <div class="input-group">
                <label for="p-name">氏名（職員ID兼用）</label>
                <input type="text" id="p-name" placeholder="例：サトウ" autocomplete="off">
            </div>
            <div class="input-group" style="margin-top:15px;">
                <label for="p-food">直近の摂取物（記録用）</label>
                <input type="text" id="p-food" placeholder="例：ツナマヨ、ビール等" autocomplete="off">
            </div>
            <button id="btn-login" onclick="login()">業務を再開</button>
        </div>
        
        <div class="home-indicator"></div>
    </div>
</div>

<!-- --- Professional Terminal (PC) Interface --- -->
<div id="pc-screen">
    <div class="pc-header">
        <span class="station-id">WHITENING_DAY // PROTOCOL_702</span>
        <span class="pc-clock-label">CURRENT_TIME: <span id="pc-clock">00:00:00</span></span>
    </div>
    
    <div id="main-layout">
        <div id="work-area">
            <div id="console-header">TASK_LOG: <span id="case-id">A-102</span></div>
            <div id="console"></div>
            <div id="monologue" class="monologue"></div>
        </div>
        
        <div id="chat-area">
            <div class="chat-header">INTERNAL_CHAT</div>
            <div id="chat-log" class="chat-log"></div>
        </div>
    </div>
    
    <div class="pc-footer">
        <button id="btn-next" onclick="nextStage()" disabled>研磨未完了</button>
    </div>
</div>

<div id="final-purified" class="hidden">
    <div class="purified-text">PURIFIED.</div>
</div>

<script src="main.js"></script>
</body>
</html>
