<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Whitening System - 端末No.702</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Sawarabi+Mincho&family=Roboto+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div id="container">
        <div class="header">
            <span>WHITENING_STATION // UNIT_702</span>
            <span id="clock">00:00:00</span>
        </div>

        <!-- Setup Screen -->
        <div id="ui-setup" class="fade-in">
            <h2 style="font-weight:lighter; color: #64748b; letter-spacing:0.3em; margin-bottom: 30px;">業務開始：環境同期</h2>
            <p style="font-size:0.8rem; color:#94a3b8; margin-bottom:30px;">※本業務で得られた個人情報は、作業終了後ただちに漂白されます。</p>

            <div style="margin-bottom:20px;">
                <label style="font-size:0.75rem; color:#94a3b8;">職員名（ID）</label>
                <input type="text" id="p-name" placeholder="氏名">
            </div>
            
            <div style="margin-bottom:20px;">
                <label style="font-size:0.75rem; color:#94a3b8;">好きなおにぎりの具</label>
                <input type="text" id="p-food" placeholder="例：ツナマヨ">
            </div>
            
            <div id="news-loader" style="font-size:0.75rem; color:var(--accent-blue);">最新のノイズを同期中...</div>

            <button id="start-btn" onclick="startWork()" disabled>打刻：業務を開始</button>
        </div>

        <!-- Work Screen -->
        <div id="ui-work" class="hidden" style="display:contents;">
            <div id="main-layout">
                <!-- 左：作業エリア -->
                <div id="work-area">
                    <div id="console"></div>
                    <div id="monologue" class="monologue"></div>
                </div>

                <!-- 右：チャットエリア -->
                <div id="chat-area">
                    <div style="font-size:0.6rem; color:#cbd5e1; margin-bottom:12px; letter-spacing:0.1em;">INTERNAL_CHAT: SATO</div>
                    <div id="chat-log"></div>
                </div>
            </div>

            <button id="btn-next" onclick="advanceStage()" disabled>漂白未完了</button>
        </div>

        <!-- Overlay -->
        <div id="overlay"></div>
    </div>

    <script src="main.js"></script>
</body>
</html>
